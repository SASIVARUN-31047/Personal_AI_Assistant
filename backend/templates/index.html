<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JARVIS ENERGY CORE</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #02040a, #000);
  font-family: system-ui, Segoe UI, sans-serif;
}

/* ================= CONTROLS ================= */

#controls {
  position: fixed;
  top: 26px;
  right: 26px;
  display: flex;
  gap: 16px;
  z-index: 20;
}

.activate-btn {
  padding: 10px 26px;
  border-radius: 999px;
  border: 1px solid #4fa3ff;
  color: #4fa3ff;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  background: rgba(79, 163, 255, 0.08);
  transition: 0.3s;
}

.activate-btn:hover {
  background: #4fa3ff;
  color: #000;
  box-shadow: 0 0 22px rgba(79,163,255,0.8);
}

.stop-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(255,120,120,0.7);
  color: rgba(255,120,120,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: rgba(255,120,120,0.05);
  transition: 0.25s;
}

.stop-btn:hover {
  background: rgba(255,120,120,0.9);
  color: #000;
  box-shadow: 0 0 18px rgba(255,120,120,0.8);
}

/* ================= STATUS ================= */

#overlay {
  position: absolute;
  bottom: 28px;
  width: 100%;
  text-align: center;
  color: #6fb8ff;
  pointer-events: none;
}

#status {
  font-size: 14px;
  opacity: 0.85;
}

#response {
  margin-top: 6px;
  font-size: 13px;
  opacity: 0.6;
  max-width: 420px;
  margin-inline: auto;
}
</style>
</head>

<body>

<div id="controls">
  <div class="activate-btn" onclick="startListening()">ACTIVATE</div>
  <div class="stop-btn" onclick="hardStop()">⏹</div>
</div>

<div id="overlay">
  <div id="status">Idle</div>
  <div id="response"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>

<script>
/* ================= THREE SCENE ================= */
speechSynthesis.onvoiceschanged = () => {
  console.log("Voices loaded");
};

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.z = 90;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* ================= ENERGY SPHERE ================= */

const group = new THREE.Group();
scene.add(group);

const layerCount = 3;
const particleCount = 2000;

let layers = [];
let baseSpeed = 0.001;
let glowPower = 0.6;

for (let l = 0; l < layerCount; l++) {
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);

  for (let i = 0; i < particleCount; i++) {
    const r = 25 + Math.random() * 6;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);

    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
  }

  geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

  const material = new THREE.PointsMaterial({
    color: 0x4fa3ff,
    size: 1.1,
    transparent: true,
    opacity: 0.45,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  const points = new THREE.Points(geometry, material);
  group.add(points);

  layers.push({ points, speed: baseSpeed * (l + 1) });
}

/* ================= STATE ================= */

let isSpeaking = false;

/* ================= ANIMATION ================= */

function animate(t) {
  requestAnimationFrame(animate);

  layers.forEach((layer, i) => {
    layer.points.rotation.y += layer.speed * (1 + Math.sin(t * 0.001 + i));
    layer.points.rotation.x += layer.speed * 0.6;
    layer.points.material.opacity = glowPower;
  });

  renderer.render(scene, camera);
}
animate(0);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ================= VOICE ================= */

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();
recognition.lang = "en-IN";
recognition.interimResults = false;
recognition.continuous = false;

let recognizing = false;
let state = "sleep";

function startRecognition() {
  if (!recognizing) {
    recognition.start();
    recognizing = true;
  }
}

function stopRecognition() {
  if (recognizing) {
    recognition.stop();
    recognizing = false;
  }
}

/* HARD STOP */
function hardStop() {
  window.speechSynthesis.cancel();
  recognition.abort();
  isSpeaking = false;
  baseSpeed = 0.001;
  glowPower = 0.45;
  state = "sleep";
  document.getElementById("status").innerText = "Stopped";
  setTimeout(startRecognition, 600);
}

/* SPEAK */
function speak(text) {
  stopRecognition();
  recognition.abort();
  isSpeaking = true;

  baseSpeed = 0.01;
  glowPower = 0.9;
  document.getElementById("status").innerText = "Speaking";

  window.speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
msg.lang = "en-IN";

// 🔊 Try to pick a MALE voice
const voices = speechSynthesis.getVoices();

const maleVoice = voices.find(v =>
  v.name.toLowerCase().includes("male") ||
  v.name.toLowerCase().includes("ravi") ||
  v.name.toLowerCase().includes("david") ||
  v.name.toLowerCase().includes("alex")
);

if (maleVoice) {
  msg.voice = maleVoice;
}

// 🎚️ Make it sound more masculine
msg.pitch = 0.85;   // lower = deeper voice
msg.rate  = 0.95;   // slightly slower
msg.volume = 1.0;

  msg.onend = () => {
    isSpeaking = false;
    baseSpeed = 0.001;
    glowPower = 0.45;
    setTimeout(startRecognition, 600);
  };

  window.speechSynthesis.speak(msg);
}

function startListening() {
  speak("System online");
  startRecognition();
}

/* LISTEN */
recognition.onresult = (event) => {
  if (isSpeaking) return;

  const text =
    event.results[event.results.length - 1][0].transcript
      .toLowerCase()
      .trim();

  document.getElementById("status").innerText = "Heard: " + text;

  if (text.includes("stop")) {
    hardStop();
    return;
  }

  if (state === "sleep") {
    if (text.includes("jarvis")) {
      state = "listening";
      baseSpeed = 0.004;
      glowPower = 0.7;
      document.getElementById("status").innerText = "Listening";
      speak("Yes");
    }
    return;
  }

  if (state === "listening") {
    stopRecognition();
    fetch("/command", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ command: text })
    })
    .then(res => res.json())
    .then(data => {
      document.getElementById("response").innerText = data.response;
      speak(data.response);
      state = "sleep";
    });
  }
};

recognition.onend = () => {
  recognizing = false;
  setTimeout(startRecognition, 700);
};
</script>

</body>
</html>
