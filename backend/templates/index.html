<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>JARVIS ENERGY CORE</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #02040a, #000);
  font-family: system-ui, Segoe UI, sans-serif;
  -webkit-text-size-adjust: 100%;
  width: 100%;
  height: 100%;
}
body { height: 100dvh; }
canvas { display: block; }

/* ================= CONTROLS ================= */
#controls {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + clamp(12px, 2.5vw, 26px));
  right: calc(env(safe-area-inset-right, 0px) + clamp(12px, 2.5vw, 26px));
  display: flex;
  gap: clamp(8px, 1.5vw, 16px);
  z-index: 20;
}
.activate-btn {
  padding: clamp(7px, 1.4vw, 10px) clamp(14px, 2.8vw, 26px);
  border-radius: 999px;
  border: 1px solid #4fa3ff;
  color: #4fa3ff;
  font-size: clamp(10px, 2.4vw, 13px);
  letter-spacing: clamp(1px, 0.4vw, 2px);
  cursor: pointer;
  background: rgba(79, 163, 255, 0.08);
  transition: 0.3s;
  white-space: nowrap;
}
.activate-btn:hover {
  background: #4fa3ff; color: #000;
  box-shadow: 0 0 22px rgba(79,163,255,0.8);
}
.stop-btn {
  width: clamp(34px, 8vw, 40px);
  height: clamp(34px, 8vw, 40px);
  border-radius: 50%;
  border: 1px solid rgba(255,120,120,0.7);
  color: rgba(255,120,120,0.9);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  background: rgba(255,120,120,0.05);
  transition: 0.25s; flex: 0 0 auto;
}
.stop-btn:hover {
  background: rgba(255,120,120,0.9); color: #000;
  box-shadow: 0 0 18px rgba(255,120,120,0.8);
}

/* ================= STATUS / CAPTIONS ================= */
#overlay {
  position: absolute;
  bottom: calc(env(safe-area-inset-bottom, 0px) + clamp(14px, 3vw, 28px));
  width: 100%;
  text-align: center;
  color: #6fb8ff;
  pointer-events: none;
}
#status { font-size: clamp(12px, 3vw, 14px); opacity: 0.85; }
#caption {
  margin-top: clamp(8px, 2vw, 12px);
  max-width: min(92vw, 460px);
  margin-inline: auto;
  display: flex; flex-direction: column;
  gap: clamp(4px, 1vw, 6px);
}
#heard, #response {
  font-size: clamp(12px, 3.2vw, 14px);
  line-height: 1.5;
  padding: 0 clamp(12px, 4vw, 18px);
  overflow-wrap: anywhere;
}
#heard { color: #9fc4ff; opacity: 0.9; }
#response { color: #cfe6ff; opacity: 0.95; }
.cap-label {
  font-size: clamp(9px, 2.2vw, 10px);
  letter-spacing: 2px; opacity: 0.55; margin-right: 6px;
}

/* ===== PROCESS LOG ===== */
#proclog {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + clamp(12px, 2.5vw, 26px));
  left: calc(env(safe-area-inset-left, 0px) + clamp(12px, 2.5vw, 26px));
  z-index: 20;
  width: clamp(140px, 42vw, 260px);
  padding: clamp(9px, 1.6vw, 12px) clamp(10px, 1.6vw, 14px);
  border: 1px solid rgba(79,163,255,0.25);
  border-radius: 10px;
  background: rgba(79,163,255,0.04);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: clamp(9px, 2.1vw, 11px);
  line-height: 1.65; color: #7fb6ff; pointer-events: none;
}
#proclog .plog-title {
  font-size: clamp(8px, 1.8vw, 9px);
  letter-spacing: 2px; opacity: 0.5; margin-bottom: 6px;
}
#proclog .plog-line {
  display: flex; gap: clamp(5px, 1.2vw, 8px);
  opacity: 0; transform: translateY(-3px);
  animation: plogIn 0.25s ease forwards;
}
#proclog .plog-time { opacity: 0.45; }
#proclog .plog-line.done .plog-dot { color: #4ad991; }
#proclog .plog-line.active .plog-dot { color: #4fa3ff; }
#proclog .plog-line.err .plog-dot,
#proclog .plog-line.err { color: #ff7a85; }
@keyframes plogIn { to { opacity: 1; transform: translateY(0); } }
@media (max-width: 430px) { #proclog .plog-time { display: none; } }

/* =====================================================
   TEXT CHAT PANEL  (globe stays; this docks bottom-right)
   ===================================================== */
#chat-toggle {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
  right: calc(env(safe-area-inset-right, 0px) + 20px);
  z-index: 30;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  border-radius: 999px;
  border: 1px solid #4fa3ff;
  color: #4fa3ff;
  background: rgba(8, 14, 26, 0.85);
  font-size: 13px; letter-spacing: 1px;
  cursor: pointer; transition: 0.25s;
  backdrop-filter: blur(6px);
}
#chat-toggle:hover {
  background: #4fa3ff; color: #02040a;
  box-shadow: 0 0 20px rgba(79,163,255,0.6);
}

#chat-panel {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
  right: calc(env(safe-area-inset-right, 0px) + 20px);
  z-index: 31;
  width: min(380px, 92vw);
  height: min(60vh, 560px);
  display: none;
  flex-direction: column;
  border: 1px solid rgba(79,163,255,0.3);
  border-radius: 16px;
  background: rgba(6, 11, 22, 0.92);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  overflow: hidden;
}
#chat-panel.open { display: flex; }

#chat-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px;
  border-bottom: 1px solid rgba(79,163,255,0.18);
  color: #9fc4ff; font-size: 12px; letter-spacing: 2px;
}
#chat-head .ch-actions { display: flex; gap: 10px; }
#chat-head button {
  background: transparent; border: none; color: #6fa8e0;
  cursor: pointer; font-size: 16px; line-height: 1;
}
#chat-head button:hover { color: #fff; }

#chat-messages {
  flex: 1; overflow-y: auto;
  padding: 14px; display: flex; flex-direction: column; gap: 10px;
}
#chat-messages::-webkit-scrollbar { width: 6px; }
#chat-messages::-webkit-scrollbar-thumb {
  background: rgba(79,163,255,0.25); border-radius: 3px;
}
.msg { max-width: 85%; padding: 9px 12px; border-radius: 12px;
  font-size: 14px; line-height: 1.5; overflow-wrap: anywhere; }
.msg.user {
  align-self: flex-end;
  background: rgba(79,163,255,0.16);
  border: 1px solid rgba(79,163,255,0.35);
  color: #dcebff7; border-bottom-right-radius: 4px;
}
.msg.bot {
  align-self: flex-start;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: #e6f0fb; border-bottom-left-radius: 4px;
}
.msg.typing { color: #7fb6ff; font-style: italic; opacity: 0.8; }
.chat-empty {
  margin: auto; text-align: center; color: #5d7790;
  font-size: 13px; padding: 0 20px; line-height: 1.6;
}

#chat-input-row {
  display: flex; gap: 8px; padding: 12px;
  border-top: 1px solid rgba(79,163,255,0.18);
}
#chat-input {
  flex: 1; resize: none; max-height: 90px;
  padding: 10px 12px; border-radius: 10px;
  border: 1px solid rgba(79,163,255,0.3);
  background: rgba(0,0,0,0.3); color: #e6f0fb;
  font-family: inherit; font-size: 14px; line-height: 1.4;
  outline: none;
}
#chat-input:focus { border-color: #4fa3ff; }
#chat-send {
  flex: 0 0 auto; width: 44px; border-radius: 10px;
  border: none; cursor: pointer; color: #02040a;
  background: #4fa3ff; font-size: 18px;
  transition: filter 0.2s;
}
#chat-send:hover { filter: brightness(1.1); }
#chat-send:disabled { opacity: 0.5; cursor: default; }

/* On phones, make the chat a near-fullscreen bottom sheet */
@media (max-width: 600px) {
  #chat-panel {
    width: 100vw; height: 78dvh;
    right: 0; bottom: 0;
    border-radius: 16px 16px 0 0;
  }
  #chat-toggle { bottom: calc(env(safe-area-inset-bottom, 0px) + 14px); right: 14px; }
}
</style>
</head>

<body>

<div id="controls">
  <div class="activate-btn" onclick="startListening()">ACTIVATE</div>
  <div class="stop-btn" onclick="hardStop()">⏹</div>
</div>

<div id="proclog">
  <div class="plog-title">PROCESS</div>
  <div id="proclog-body"></div>
</div>

<div id="overlay">
  <div id="status">Idle</div>
  <div id="caption">
    <div id="heard"></div>
    <div id="response"></div>
  </div>
</div>

<!-- ===== TEXT CHAT ===== -->
<div id="chat-toggle" onclick="toggleChat()">💬 CHAT</div>

<div id="chat-panel">
  <div id="chat-head">
    <span>JARVIS · CHAT</span>
    <div class="ch-actions">
      <button title="Clear conversation" onclick="clearChat()">⟳</button>
      <button title="Close" onclick="toggleChat()">✕</button>
    </div>
  </div>
  <div id="chat-messages">
    <div class="chat-empty">Type a message to start. I remember the conversation, so you can ask follow-ups.</div>
  </div>
  <div id="chat-input-row">
    <textarea id="chat-input" rows="1" placeholder="Message JARVIS..."></textarea>
    <button id="chat-send" onclick="sendChat()">➤</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>

<script>
/* ================= THREE SCENE ================= */
speechSynthesis.onvoiceschanged = () => { console.log("Voices loaded"); };

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.z = 90;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const group = new THREE.Group();
scene.add(group);

const layerCount = 3;
const particleCount = (innerWidth < 600) ? 1200 : 2000;
let layers = [];
let baseSpeed = 0.001;
let glowPower = 0.6;

for (let l = 0; l < layerCount; l++) {
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    const r = 25 + Math.random() * 6;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
  }
  geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  const material = new THREE.PointsMaterial({
    color: 0x4fa3ff, size: 1.1, transparent: true,
    opacity: 0.45, blending: THREE.AdditiveBlending, depthWrite: false
  });
  const points = new THREE.Points(geometry, material);
  group.add(points);
  layers.push({ points, speed: baseSpeed * (l + 1) });
}

let isSpeaking = false;

/* ================= PROCESS LOG ================= */
function nowTime() { return new Date().toTimeString().slice(0, 8); }
let lastStep = null;
function clearLog() { document.getElementById("proclog-body").innerHTML = ""; lastStep = null; }
function logStep(text, kind) {
  if (lastStep && !lastStep.classList.contains("err")) {
    lastStep.classList.remove("active"); lastStep.classList.add("done");
    const dot = lastStep.querySelector(".plog-dot");
    if (dot) dot.textContent = "✓";
  }
  const line = document.createElement("div");
  line.className = "plog-line " + (kind === "err" ? "err" : "active");
  line.innerHTML =
    '<span class="plog-dot">' + (kind === "err" ? "✕" : "▸") + '</span>' +
    '<span class="plog-time">' + nowTime() + '</span>' +
    '<span class="plog-text">' + text + '</span>';
  document.getElementById("proclog-body").appendChild(line);
  lastStep = line;
}

/* ================= ANIMATION ================= */
function animate(t) {
  requestAnimationFrame(animate);
  layers.forEach((layer, i) => {
    layer.points.rotation.y += layer.speed * (1 + Math.sin(t * 0.001 + i));
    layer.points.rotation.x += layer.speed * 0.6;
    layer.points.material.opacity = glowPower;
  });
  renderer.render(scene, camera);
}
animate(0);

/* ============ RESPONSIVE / AUTO-SCALE ============ */
function fitView() {
  const w = innerWidth, h = innerHeight;
  const aspect = w / h;
  camera.aspect = aspect;
  camera.position.z = aspect >= 1 ? 90 : 90 + (1 - aspect) * 60;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
}
fitView();
window.addEventListener("resize", fitView);
window.addEventListener("orientationchange", () => setTimeout(fitView, 150));

/* ================= VOICE ================= */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "en-IN";
recognition.interimResults = false;
recognition.continuous = false;

let recognizing = false;
let state = "sleep";

function startRecognition() { if (!recognizing) { recognition.start(); recognizing = true; } }
function stopRecognition() { if (recognizing) { recognition.stop(); recognizing = false; } }

function hardStop() {
  window.speechSynthesis.cancel();
  recognition.abort();
  isSpeaking = false; baseSpeed = 0.001; glowPower = 0.45; state = "sleep";
  document.getElementById("status").innerText = "Stopped";
  setTimeout(startRecognition, 600);
}

function speak(text) {
  stopRecognition();
  recognition.abort();
  isSpeaking = true;
  baseSpeed = 0.01; glowPower = 0.9;
  document.getElementById("status").innerText = "Speaking";
  window.speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "en-IN";
  const voices = speechSynthesis.getVoices();
  const maleVoice = voices.find(v =>
    v.name.toLowerCase().includes("male") ||
    v.name.toLowerCase().includes("ravi") ||
    v.name.toLowerCase().includes("david") ||
    v.name.toLowerCase().includes("alex"));
  if (maleVoice) msg.voice = maleVoice;
  msg.pitch = 0.85; msg.rate = 0.95; msg.volume = 1.0;
  msg.onend = () => {
    isSpeaking = false; baseSpeed = 0.001; glowPower = 0.45;
    setTimeout(startRecognition, 600);
  };
  window.speechSynthesis.speak(msg);
}

function startListening() { speak("System online"); startRecognition(); }

recognition.onresult = (event) => {
  if (isSpeaking) return;
  const text = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
  document.getElementById("status").innerText = "Heard: " + text;

  if (text.includes("stop")) { hardStop(); return; }

  if (state === "sleep") {
    if (text.includes("jarvis")) {
      state = "listening"; baseSpeed = 0.004; glowPower = 0.7;
      document.getElementById("status").innerText = "Listening";
      speak("Yes");
    }
    return;
  }

  if (state === "listening") {
    clearLog();
    logStep("Request received");
    document.getElementById("heard").innerHTML = '<span class="cap-label">YOU</span>' + text;
    document.getElementById("response").innerText = "";
    stopRecognition();
    logStep("API request sent");
    const t0 = performance.now();
    fetch("/command", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ command: text })
    })
    .then(res => { logStep("Waiting for reply"); return res.json(); })
    .then(data => {
      const ms = Math.round(performance.now() - t0);
      logStep("Processed (" + ms + " ms)");
      document.getElementById("response").innerHTML = '<span class="cap-label">JARVIS</span>' + data.response;
      speak(data.response);
      state = "sleep";
    })
    .catch(() => {
      logStep("Error — no response", "err");
      document.getElementById("response").innerHTML = '<span class="cap-label">JARVIS</span>Connection error. Try again.';
      state = "sleep";
      setTimeout(startRecognition, 600);
    });
  }
};

recognition.onend = () => { recognizing = false; setTimeout(startRecognition, 700); };

/* ================= TEXT CHAT (with memory) ================= */
const chatHistory = [];   // [{role:'user'|'model', text:'...'}]
const panel = document.getElementById("chat-panel");
const msgsEl = document.getElementById("chat-messages");
const inputEl = document.getElementById("chat-input");
const sendBtn = document.getElementById("chat-send");

function toggleChat() {
  panel.classList.toggle("open");
  if (panel.classList.contains("open")) inputEl.focus();
}

function clearChat() {
  chatHistory.length = 0;
  msgsEl.innerHTML = '<div class="chat-empty">Conversation cleared. Type a message to start again.</div>';
}

function renderChat(typing) {
  msgsEl.innerHTML = "";
  chatHistory.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.role === "user" ? "user" : "bot");
    div.textContent = m.text;
    msgsEl.appendChild(div);
  });
  if (typing) {
    const t = document.createElement("div");
    t.className = "msg bot typing";
    t.textContent = "JARVIS is typing…";
    msgsEl.appendChild(t);
  }
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

async function sendChat() {
  const text = inputEl.value.trim();
  if (!text) return;

  chatHistory.push({ role: "user", text });
  inputEl.value = "";
  inputEl.style.height = "auto";
  sendBtn.disabled = true;
  renderChat(true);   // show typing indicator

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: chatHistory })
    });
    const data = await res.json();
    chatHistory.push({ role: "model", text: data.response || "No response." });
  } catch (err) {
    chatHistory.push({ role: "model", text: "Connection error. Try again." });
  }

  sendBtn.disabled = false;
  renderChat(false);
}

/* Enter to send, Shift+Enter for newline; auto-grow the box */
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 90) + "px";
});
</script>

</body>
</html>
